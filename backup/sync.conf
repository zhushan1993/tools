# ============================================================
# sync.conf — 双向同步工具配置文件
# 被 sync.sh 加载，修改后直接生效
# ============================================================

# ---------- 路径别名 ----------
# WSL 工作目录
SRC_HOME="/home/zhus/ai-space"

# 移动硬盘挂载点（G 盘）
DST_G_DRIVE="/mnt/g/ai-space"

# ---------- 排除规则 ----------
# 每行一条，语法为 rsync --exclude 接受的标准 glob
# 默认排除 venv、缓存、IDE 配置等文件量大的目录
EXCLUDE_PATTERNS=(
    # --- 虚拟环境 ---
    "venv/"
    ".venv/"
    "env/"
    "pdf_venv/"
    "venv_test/"
    "*venv*/"

    # --- 编译缓存 ---
    "__pycache__/"
    "*.pyc"
    "*.pyo"
    "*.egg-info/"
    ".mypy_cache/"
    ".pytest_cache/"
    ".ipynb_checkpoints/"

    # --- IDE / 系统文件 ---
    ".idea/"
    ".vscode/"
    ".DS_Store"
    "Thumbs.db"

    # --- WSL / 挂载残留 ---
    '$RECYCLE.BIN/'
    '.Trashes/'
    '.Spotlight*/'
    '.TemporaryItems/'
    '.fseventsd/'
    'System Volume Information/'
    'DriveD/'

    # --- Windows Zone.Identifier（NTFS ADS 残留，从 Windows 同步产生） ---
    '*:Zone.Identifier'
    '*Zone.Identifier'

    # --- Claude Code ---
    ".claude/"

    # --- node / 前端构建产物（若有） ---
    "node_modules/"
    "dist/"
    "build/"
)
